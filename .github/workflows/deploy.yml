name: 部署 H5 到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

# 部署 GitHub Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署冲突
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建 H5
        env:
          # 项目站点地址是 用户名.github.io/pindou/，资源需 /pindou/ 前缀
          # 绑定自定义域名后，把这里改成 '/'
          PAGES_BASE: /pindou/
        run: npm run build:h5

      - name: 确认构建产物
        run: find dist/build/h5 -maxdepth 1 -type f | head -20

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/build/h5

      - name: 部署到 GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
